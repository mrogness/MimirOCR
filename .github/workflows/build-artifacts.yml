name: Build Unsigned Desktop Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS (app + dmg)
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: yarn

      - name: Enable Corepack and pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Install backend packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-sidecar.txt
          python -m pip install pyinstaller

      - name: Build macOS sidecar
        run: |
          export MIMIR_PYTHON="$pythonLocation/bin/python"
          yarn sidecar:preflight
          yarn build:sidecar

      - name: Inspect macOS sidecar artifacts before Tauri build
        run: |
          set -euo pipefail
          echo "Listing src-tauri/binaries:"
          ls -la src-tauri/binaries
          echo "Listing top-level sidecar bundle payload:"
          find src-tauri/binaries -maxdepth 2 -type f | sort

      - name: Build unsigned macOS artifacts
        run: |
          yarn tauri build --bundles app,dmg
          node scripts/zip_macos_app_bundle.mjs

      - name: Verify macOS sidecar bundled assets
        run: |
          set -euo pipefail
          APP_DIR="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_DIR" ]; then
            echo "No .app bundle found in macOS output directory" >&2
            exit 1
          fi

          BINARY_DIR="$APP_DIR/Contents/Resources/binaries"
          if [ ! -d "$BINARY_DIR" ]; then
            echo "Missing bundled binaries directory: $BINARY_DIR" >&2
            exit 1
          fi

          echo "Bundled binaries:"
          ls -la "$BINARY_DIR"

          NON_SENTINEL_COUNT="$(find "$BINARY_DIR" -type f ! -name 'backend-sentinel' | wc -l | tr -d ' ')"
          if [ "$NON_SENTINEL_COUNT" -eq 0 ]; then
            echo "Only sentinel artifact was bundled; sidecar runtime is missing." >&2
            exit 1
          fi

          BUNDLED_RUNTIME_COUNT="$(find "$BINARY_DIR" -type f -name 'backend-*-bundle*' | wc -l | tr -d ' ')"
          if [ "$BUNDLED_RUNTIME_COUNT" -eq 0 ]; then
            echo "No onedir sidecar runtime payload detected inside app bundle." >&2
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mimir-macos-unsigned
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.zip
            src-tauri/target/release/bundle/macos/*.command
          if-no-files-found: error

  build-windows:
    name: Build Windows (nsis)
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: yarn

      - name: Enable Corepack and pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Create venv and install backend packaging dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\.venv\Scripts\python.exe -m pip install -r requirements-sidecar.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\.venv\Scripts\python.exe -m pip install kraken==4.3.13
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\.venv\Scripts\python.exe -m pip install pyinstaller
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Debug installed sidecar packages
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip show kraken
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\.venv\Scripts\python.exe -m pip show calamari-ocr
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify sidecar Python imports
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -c "import kraken, calamari_ocr, uvicorn; print('python sidecar deps ok')"

      - name: Build Windows sidecar
        shell: pwsh
        run: |
          $env:MIMIR_PYTHON = "$pwd\.venv\Scripts\python.exe"
          $env:PYTHON = "$pwd\.venv\Scripts\python.exe"
          yarn sidecar:preflight
          yarn build:sidecar

      - name: Inspect Windows sidecar artifacts before Tauri build
        shell: pwsh
        run: |
          Write-Host "Listing src-tauri/binaries"
          Get-ChildItem -Path "src-tauri/binaries" -Force
          Write-Host "Listing nested sidecar payload files"
          Get-ChildItem -Path "src-tauri/binaries" -Recurse -File | Select-Object -ExpandProperty FullName

      - name: Build unsigned Windows installer
        shell: pwsh
        run: |
          yarn tauri build --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mimir-windows-unsigned
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish-release-macos:
    name: Publish macOS Release Assets
    runs-on: ubuntu-latest
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/v') && needs.build-macos.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: mimir-macos-unsigned
          path: release-assets/macos

      - name: Inspect macOS release payload
        run: |
          set -euo pipefail
          echo "macOS files to upload:"
          find release-assets/macos -maxdepth 3 -type f | sort

      - name: Prepare release notes
        run: |
          cat > release-notes.txt << 'EOF'
          Unsigned build artifacts are attached to this release.

          Expected first-run behavior:
          - macOS may show Gatekeeper warnings for unsigned apps.
          - Windows may show SmartScreen warnings for unsigned binaries.
          EOF

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.txt

      - name: Publish macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(
            release-assets/macos/macos/*.app.zip
            release-assets/macos/dmg/*.dmg
            release-assets/macos/macos/*.command
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No macOS release files found to upload." >&2
            exit 1
          fi

          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber

  publish-release-windows:
    name: Publish Windows Release Assets
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v') && needs.build-windows.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: mimir-windows-unsigned
          path: release-assets/windows

      - name: Inspect Windows release payload
        run: |
          set -euo pipefail
          echo "Windows files to upload:"
          find release-assets/windows -maxdepth 3 -type f | sort

      - name: Prepare release notes
        run: |
          cat > release-notes.txt << 'EOF'
          Unsigned build artifacts are attached to this release.

          Expected first-run behavior:
          - macOS may show Gatekeeper warnings for unsigned apps.
          - Windows may show SmartScreen warnings for unsigned binaries.
          EOF

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.txt

      - name: Publish Windows assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(release-assets/windows/**/*.exe)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Windows release files found to upload." >&2
            exit 1
          fi

          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
