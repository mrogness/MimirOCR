name: Build Unsigned Desktop Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (app + dmg)
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Enable Corepack and pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Install backend packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build unsigned macOS artifacts
        run: |
          export MIMIR_PYTHON="$pythonLocation/bin/python"
          yarn package:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mimir-macos-unsigned
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/macos/*.dmg
            src-tauri/target/release/bundle/macos/*.app.zip
            src-tauri/target/release/bundle/macos/*.command
          if-no-files-found: error

  build-windows:
    name: Build Windows (nsis + portable)
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Enable Corepack and pin Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Install backend packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build unsigned Windows installer
        shell: pwsh
        run: |
          $env:MIMIR_PYTHON = "$env:pythonLocation\\python.exe"
          yarn package:windows

      - name: Create portable zip
        shell: pwsh
        run: |
          $portable = "src-tauri/target/release/bundle/mimir-portable.zip"
          if (Test-Path $portable) {
            Remove-Item $portable -Force
          }
          Compress-Archive -Path "src-tauri/target/release/mimir.exe" -DestinationPath $portable

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mimir-windows-unsigned
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/mimir-portable.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mimir-macos-unsigned
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: mimir-windows-unsigned
          path: release-assets/windows

      - name: Prepare release notes
        run: |
          cat > release-notes.txt << 'EOF'
          Unsigned build artifacts are attached to this release.

          Expected first-run behavior:
          - macOS may show Gatekeeper warnings for unsigned apps.
          - Windows may show SmartScreen warnings for unsigned binaries.
          EOF

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          files: |
            release-assets/macos/*.app.zip
            release-assets/macos/*.dmg
            release-assets/macos/*.command
            release-assets/windows/*.exe
            release-assets/windows/*.zip
